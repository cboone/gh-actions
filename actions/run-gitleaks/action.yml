name: Run gitleaks
description: Install gitleaks binary and run a scan.

inputs:
  version:
    description: gitleaks version to install
    required: false
    default: "8.30.0"
  args:
    description: Arguments to pass to gitleaks
    required: false
    default: "detect --source ."

runs:
  using: composite
  steps:
    - name: Install gitleaks
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        case "$(uname -s)" in
          Linux) os="linux" ;;
          Darwin) os="darwin" ;;
          *)
            echo "Unsupported operating system: $(uname -s)" >&2
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64) arch="x64" ;;
          arm64|aarch64) arch="arm64" ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        base="https://github.com/gitleaks/gitleaks/releases/download"
        curl -sSfL "${base}/v${VERSION}/gitleaks_${VERSION}_${os}_${arch}.tar.gz" \
          | tar -xz -C /usr/local/bin gitleaks
        gitleaks version

    - name: Run gitleaks
      shell: bash
      env:
        GITLEAKS_ARGS: ${{ inputs.args }}
      run: |
        gitleaks ${GITLEAKS_ARGS} --verbose
