name: Setup shfmt
description: Install shfmt binary with a pinned version.

inputs:
  version:
    description: shfmt version to install
    required: false
    default: "3.12.0"

runs:
  using: composite
  steps:
    - name: Install shfmt
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        case "$(uname -s)" in
          Linux) os="linux" ;;
          Darwin) os="darwin" ;;
          *)
            echo "Unsupported operating system: $(uname -s)" >&2
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64) arch="amd64" ;;
          arm64|aarch64) arch="arm64" ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        curl -sSfL "https://github.com/mvdan/sh/releases/download/v${VERSION}/shfmt_v${VERSION}_${os}_${arch}" \
          -o /usr/local/bin/shfmt
        chmod +x /usr/local/bin/shfmt
        shfmt --version
