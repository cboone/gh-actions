name: Setup shfmt
description: Install shfmt binary with a pinned version.

inputs:
  version:
    description: shfmt version to install
    required: false
    default: "3.12.0"

runs:
  using: composite
  steps:
    - name: Install shfmt
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        curl -sSfL "https://github.com/mvdan/sh/releases/download/v${VERSION}/shfmt_v${VERSION}_linux_amd64" \
          -o /usr/local/bin/shfmt
        chmod +x /usr/local/bin/shfmt
        shfmt --version
