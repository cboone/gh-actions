name: Setup golangci-lint
description: Install golangci-lint binary with a pinned version.

inputs:
  version:
    description: golangci-lint version to install
    required: false
    default: "2.11.2"

runs:
  using: composite
  steps:
    - name: Install golangci-lint
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        case "$(uname -s)" in
          Linux) os="linux" ;;
          Darwin) os="darwin" ;;
          *)
            echo "Unsupported operating system: $(uname -s)" >&2
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64) arch="amd64" ;;
          arm64|aarch64) arch="arm64" ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        archive="golangci-lint-${VERSION}-${os}-${arch}.tar.gz"
        bin_dir="${RUNNER_TEMP}/golangci-lint-bin"
        mkdir -p "${bin_dir}"
        curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v${VERSION}/${archive}" \
          | tar -xz -C "${RUNNER_TEMP}"
        install -m 0755 \
          "${RUNNER_TEMP}/golangci-lint-${VERSION}-${os}-${arch}/golangci-lint" \
          "${bin_dir}/golangci-lint"
        printf '%s\n' "${bin_dir}" >> "${GITHUB_PATH}"
        "${bin_dir}/golangci-lint" version
