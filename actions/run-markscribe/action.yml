name: Run markscribe
description: Install markscribe binary and generate a file from a template.

inputs:
  version:
    description: markscribe version to install
    required: false
    default: "0.8.1"
  template:
    description: Path to the Go template file.
    required: false
    default: README.md.tpl
  write-to:
    description: >-
      Output file path. When empty, markscribe prints to stdout.
    required: false
    default: README.md

runs:
  using: composite
  steps:
    - name: Install markscribe
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        case "$(uname -s)" in
          Linux) os="Linux" ;;
          Darwin) os="Darwin" ;;
          *)
            echo "Unsupported operating system: $(uname -s)" >&2
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64) arch="x86_64" ;;
          arm64|aarch64) arch="arm64" ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        install_dir="${RUNNER_TEMP}/markscribe-bin"
        mkdir -p "${install_dir}"
        base="https://github.com/charmbracelet/markscribe/releases/download"
        archive="markscribe_${VERSION}_${os}_${arch}.tar.gz"
        archive_path="${install_dir}/${archive}"
        curl -sSfL "${base}/v${VERSION}/${archive}" -o "${archive_path}"
        curl -sSfL "${base}/v${VERSION}/checksums.txt" \
          -o "${install_dir}/checksums.txt"
        expected="$(awk -v file="${archive}" '$2 == file { print $1; exit }' "${install_dir}/checksums.txt")"
        if [ -z "${expected}" ]; then
          echo "Checksum entry not found for ${archive}" >&2
          exit 1
        fi
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "${archive_path}" | awk '{print $1}')"
        else
          actual="$(shasum -a 256 "${archive_path}" | awk '{print $1}')"
        fi
        if [ "${expected}" != "${actual}" ]; then
          echo "Checksum verification failed for ${archive}" >&2
          echo "Expected: ${expected}" >&2
          echo "Actual:   ${actual}" >&2
          exit 1
        fi
        archive_root="markscribe_${VERSION}_${os}_${arch}"
        tar -xz -C "${install_dir}" -f "${archive_path}" --strip-components=1 "${archive_root}/markscribe"
        printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"
        "${install_dir}/markscribe" --version

    - name: Run markscribe
      shell: bash
      env:
        MARKSCRIBE_TEMPLATE: ${{ inputs.template }}
        MARKSCRIBE_WRITE_TO: ${{ inputs.write-to }}
      run: |
        args=()
        if [ -n "${MARKSCRIBE_WRITE_TO}" ]; then
          args+=("-write" "${MARKSCRIBE_WRITE_TO}")
        fi
        args+=("${MARKSCRIBE_TEMPLATE}")
        markscribe "${args[@]}"
