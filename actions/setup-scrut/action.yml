name: Setup scrut
description: Install scrut CLI testing tool with a pinned version.

inputs:
  version:
    description: scrut version to install
    required: false
    default: "0.4.3"

runs:
  using: composite
  steps:
    - name: Install scrut
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        ARCH="$(uname -m)"
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        URL="https://github.com/facebookincubator/scrut/releases/download/v${VERSION}/scrut-v${VERSION}-${OS}-${ARCH}.tar.gz"
        install_dir="${RUNNER_TEMP}/scrut-bin"
        mkdir -p "${install_dir}"
        curl -sSfL "${URL}" | tar -xz -C "${install_dir}" scrut
        printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"
        "${install_dir}/scrut" --version
