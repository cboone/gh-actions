name: Setup GoReleaser
description: Install GoReleaser binary with a pinned version.

inputs:
  version:
    description: GoReleaser version to install
    required: false
    default: "2.14.2"

runs:
  using: composite
  steps:
    - name: Install GoReleaser
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        case "$(uname -s)" in
          Linux) os="Linux" ;;
          Darwin) os="Darwin" ;;
          *)
            echo "Unsupported operating system: $(uname -s)" >&2
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64) arch="x86_64" ;;
          arm64|aarch64) arch="arm64" ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        base="https://github.com/goreleaser/goreleaser/releases/download"
        curl -sSfL "${base}/v${VERSION}/goreleaser_${os}_${arch}.tar.gz" \
          | tar -xz -C /usr/local/bin goreleaser
        goreleaser --version
