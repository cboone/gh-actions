name: Run reuse
description: >-
  Run `reuse` (default: `reuse lint`) to verify SPDX/REUSE compliance.
  Replaces fsfe/reuse-action with a thin wrapper that installs reuse
  from this repo's hash-pinned `requirements/reuse.txt` (every
  transitive dependency is sha256-pinned), so a tampered PyPI response
  cannot slip past the install. uv is downloaded with sha256
  verification.

inputs:
  uv-version:
    description: uv version to install for the reuse install step.
    required: false
    default: "0.11.8"
  args:
    description: >-
      Arguments to pass to `reuse`. Newline-delimited; each line
      becomes a separate positional argument. Defaults to `lint`.
    required: false
    default: "lint"

runs:
  using: composite
  steps:
    - name: Install uv
      shell: bash
      env:
        UV_VERSION: ${{ inputs.uv-version }}
      run: |
        case "$(uname -s)" in
          Linux)
            case "$(uname -m)" in
              x86_64) target="x86_64-unknown-linux-gnu" ;;
              arm64|aarch64) target="aarch64-unknown-linux-gnu" ;;
              *)
                echo "Unsupported Linux architecture: $(uname -m)" >&2
                exit 1
                ;;
            esac
            ;;
          Darwin)
            case "$(uname -m)" in
              x86_64) target="x86_64-apple-darwin" ;;
              arm64|aarch64) target="aarch64-apple-darwin" ;;
              *)
                echo "Unsupported macOS architecture: $(uname -m)" >&2
                exit 1
                ;;
            esac
            ;;
          *)
            echo "Unsupported operating system: $(uname -s)" >&2
            exit 1
            ;;
        esac
        archive="uv-${target}.tar.gz"
        base_url="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}"
        archive_path="${RUNNER_TEMP}/${archive}"
        curl -sSfL "${base_url}/${archive}" -o "${archive_path}"
        curl -sSfL "${base_url}/${archive}.sha256" -o "${archive_path}.sha256"
        expected="$(awk '{print $1}' "${archive_path}.sha256")"
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "${archive_path}" | awk '{print $1}')"
        else
          actual="$(shasum -a 256 "${archive_path}" | awk '{print $1}')"
        fi
        if [ "${expected}" != "${actual}" ]; then
          echo "Checksum verification failed for ${archive}" >&2
          echo "Expected: ${expected}" >&2
          echo "Actual:   ${actual}" >&2
          exit 1
        fi
        install_dir="${RUNNER_TEMP}/uv-bin"
        mkdir -p "${install_dir}"
        tar -xz -C "${RUNNER_TEMP}" -f "${archive_path}"
        install -m 0755 "${RUNNER_TEMP}/uv-${target}/uv" "${install_dir}/uv"
        printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"
        "${install_dir}/uv" --version

    - name: Install reuse with hash-pinned requirements
      shell: bash
      env:
        # `${{ github.action_path }}` points at this action's directory
        # inside the gh-actions repo checkout the runner made to load
        # the composite action; the repo root (which holds
        # requirements/reuse.txt) is two levels up. Pinning the
        # manifest to the SHA the action was loaded at means a tampered
        # PyPI response cannot pass the per-package hash check.
        REQUIREMENTS_FILE: ${{ github.action_path }}/../../requirements/reuse.txt
      run: |
        if [ ! -f "${REQUIREMENTS_FILE}" ]; then
          echo "::error::requirements file not found: ${REQUIREMENTS_FILE}" >&2
          exit 1
        fi
        venv_dir="${RUNNER_TEMP}/reuse-venv"
        uv venv "${venv_dir}" --quiet
        uv pip install \
          --python "${venv_dir}/bin/python" \
          --require-hashes \
          -r "${REQUIREMENTS_FILE}" \
          --quiet
        printf '%s\n' "${venv_dir}/bin" >> "${GITHUB_PATH}"
        "${venv_dir}/bin/reuse" --version

    - name: Run reuse
      shell: bash
      env:
        REUSE_ARGS: ${{ inputs.args }}
      run: |
        args=()
        while IFS= read -r line; do
          [ -n "${line}" ] && args+=("${line}")
        done <<< "${REUSE_ARGS}"
        reuse "${args[@]}"
