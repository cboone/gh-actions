name: Secret Scan

on:
  workflow_call:
    inputs:
      tool:
        description: >-
          Which tool to run: gitleaks, trufflehog, or both.
        type: string
        default: gitleaks
      scan-scope:
        description: >-
          Scan scope: full-history, working-tree, or both.
        type: string
        default: full-history
      gitleaks-version:
        description: gitleaks version to install.
        type: string
        default: "8.30.0"
      trufflehog-version:
        description: trufflehog version to install.
        type: string
        default: "3.93.7"
      fetch-depth:
        description: >-
          Git fetch depth. Set to 0 for full history (default for
          full-history scans), 1 for working-tree only scans.
        type: number
        default: 0
      allowlist-config:
        description: Path to a gitleaks allowlist config file.
        type: string
        default: ""
      timeout-minutes:
        description: Job timeout in minutes.
        type: number
        default: 15

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    if: inputs.tool == 'gitleaks' || inputs.tool == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: >-
            ${{
              (inputs.scan-scope == 'working-tree' && 1)
              || inputs.fetch-depth
            }}

      - name: Install gitleaks
        shell: bash
        env:
          VERSION: ${{ inputs.gitleaks-version }}
        run: |
          case "$(uname -s)" in
            Linux) os="linux" ;;
            Darwin) os="darwin" ;;
            *)
              echo "Unsupported operating system: $(uname -s)" >&2
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64) arch="x64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_${os}_${arch}.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        shell: bash
        run: >-
          gitleaks detect --source .
          ${{
            (inputs.scan-scope == 'working-tree'
              && '--no-git')
            || ''
          }}
          ${{
            inputs.allowlist-config != ''
            && format('--config {0}', inputs.allowlist-config)
            || ''
          }}
          --verbose

  trufflehog:
    name: trufflehog
    if: inputs.tool == 'trufflehog' || inputs.tool == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: >-
            ${{
              (inputs.scan-scope == 'working-tree' && 1)
              || inputs.fetch-depth
            }}

      - name: Install trufflehog
        shell: bash
        env:
          VERSION: ${{ inputs.trufflehog-version }}
        run: |
          case "$(uname -s)" in
            Linux) os="linux" ;;
            Darwin) os="darwin" ;;
            *)
              echo "Unsupported operating system: $(uname -s)" >&2
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${VERSION}/trufflehog_${VERSION}_${os}_${arch}.tar.gz" \
            | tar -xz -C /usr/local/bin trufflehog

      - name: Run trufflehog
        shell: bash
        run: >-
          trufflehog
          ${{
            (inputs.scan-scope == 'working-tree'
              && 'filesystem --directory .')
            || 'git file://.'
          }}
          --results=verified,unknown
