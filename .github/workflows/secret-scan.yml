name: Secret Scan

on:
  workflow_call:
    inputs:
      tool:
        description: >-
          Which tool to run: gitleaks, trufflehog, or both.
        type: string
        default: gitleaks
      scan-scope:
        description: >-
          Scan scope: full-history or working-tree.
        type: string
        default: full-history
      gitleaks-version:
        description: gitleaks version to install.
        type: string
        default: "8.30.1"
      trufflehog-version:
        description: trufflehog version to install.
        type: string
        default: "3.95.2"
      fetch-depth:
        description: >-
          Git fetch depth. Set to 0 for full history (default for
          full-history scans), 1 for working-tree only scans.
        type: number
        default: 0
      allowlist-config:
        description: Path to a gitleaks allowlist config file.
        type: string
        default: ""
      timeout-minutes:
        description: Job timeout in minutes.
        type: number
        default: 15

permissions:
  contents: read

jobs:
  validate-inputs:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        shell: bash
        env:
          TOOL: ${{ inputs.tool }}
          SCAN_SCOPE: ${{ inputs.scan-scope }}
        run: |
          case "${TOOL}" in
            gitleaks|trufflehog|both) ;;
            *)
              echo "Invalid 'tool' input: '${TOOL}'. Expected 'gitleaks', 'trufflehog', or 'both'." >&2
              exit 1
              ;;
          esac
          case "${SCAN_SCOPE}" in
            full-history|working-tree) ;;
            *)
              echo "Invalid 'scan-scope' input: '${SCAN_SCOPE}'. Expected 'full-history' or 'working-tree'." >&2
              exit 1
              ;;
          esac

  gitleaks:
    name: gitleaks
    needs: validate-inputs
    if: inputs.tool == 'gitleaks' || inputs.tool == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: >-
            ${{
              (inputs.scan-scope == 'working-tree' && 1)
              || inputs.fetch-depth
            }}

      - name: Install gitleaks
        shell: bash
        env:
          VERSION: ${{ inputs.gitleaks-version }}
        run: |
          case "$(uname -s)" in
            Linux) os="linux" ;;
            Darwin) os="darwin" ;;
            *)
              echo "Unsupported operating system: $(uname -s)" >&2
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64) arch="x64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          install_dir="${RUNNER_TEMP}/gitleaks-bin"
          mkdir -p "${install_dir}"
          base="https://github.com/gitleaks/gitleaks/releases/download"
          archive="gitleaks_${VERSION}_${os}_${arch}.tar.gz"
          archive_path="${install_dir}/${archive}"
          curl -sSfL "${base}/v${VERSION}/${archive}" -o "${archive_path}"
          curl -sSfL "${base}/v${VERSION}/gitleaks_${VERSION}_checksums.txt" \
            -o "${install_dir}/checksums.txt"
          expected="$(grep -F "${archive}" "${install_dir}/checksums.txt" | head -1 | awk '{print $1}')"
          if [ -z "${expected}" ]; then
            echo "Checksum entry not found for ${archive}" >&2
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "${archive_path}" | awk '{print $1}')"
          else
            actual="$(shasum -a 256 "${archive_path}" | awk '{print $1}')"
          fi
          if [ "${expected}" != "${actual}" ]; then
            echo "Checksum verification failed for ${archive}" >&2
            echo "Expected: ${expected}" >&2
            echo "Actual:   ${actual}" >&2
            exit 1
          fi
          tar -xz -C "${install_dir}" -f "${archive_path}" gitleaks
          printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        shell: bash
        env:
          SCAN_SCOPE: ${{ inputs.scan-scope }}
          ALLOWLIST_CONFIG: ${{ inputs.allowlist-config }}
        run: |
          args=(detect --source .)
          if [ "${SCAN_SCOPE}" = "working-tree" ]; then
            args+=(--no-git)
          fi
          if [ -n "${ALLOWLIST_CONFIG}" ]; then
            args+=(--config "${ALLOWLIST_CONFIG}")
          fi
          args+=(--verbose)
          gitleaks "${args[@]}"

  trufflehog:
    name: trufflehog
    needs: validate-inputs
    if: inputs.tool == 'trufflehog' || inputs.tool == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: >-
            ${{
              (inputs.scan-scope == 'working-tree' && 1)
              || inputs.fetch-depth
            }}

      - name: Install trufflehog
        shell: bash
        env:
          VERSION: ${{ inputs.trufflehog-version }}
        run: |
          case "$(uname -s)" in
            Linux) os="linux" ;;
            Darwin) os="darwin" ;;
            *)
              echo "Unsupported operating system: $(uname -s)" >&2
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          install_dir="${RUNNER_TEMP}/trufflehog-bin"
          mkdir -p "${install_dir}"
          base="https://github.com/trufflesecurity/trufflehog/releases/download"
          archive="trufflehog_${VERSION}_${os}_${arch}.tar.gz"
          archive_path="${install_dir}/${archive}"
          curl -sSfL "${base}/v${VERSION}/${archive}" -o "${archive_path}"
          curl -sSfL "${base}/v${VERSION}/trufflehog_${VERSION}_checksums.txt" \
            -o "${install_dir}/checksums.txt"
          expected="$(grep -F "${archive}" "${install_dir}/checksums.txt" | head -1 | awk '{print $1}')"
          if [ -z "${expected}" ]; then
            echo "Checksum entry not found for ${archive}" >&2
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "${archive_path}" | awk '{print $1}')"
          else
            actual="$(shasum -a 256 "${archive_path}" | awk '{print $1}')"
          fi
          if [ "${expected}" != "${actual}" ]; then
            echo "Checksum verification failed for ${archive}" >&2
            echo "Expected: ${expected}" >&2
            echo "Actual:   ${actual}" >&2
            exit 1
          fi
          tar -xz -C "${install_dir}" -f "${archive_path}" trufflehog
          printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run trufflehog
        shell: bash
        run: >-
          trufflehog
          ${{
            (inputs.scan-scope == 'working-tree'
              && 'filesystem --directory .')
            || 'git file://.'
          }}
          --results=verified,unknown
