name: Secret Scan

on:
  workflow_call:
    inputs:
      tool:
        description: >-
          Which tool to run: gitleaks, trufflehog, or both.
        type: string
        default: gitleaks
      scan-scope:
        description: >-
          Scan scope: full-history, working-tree, or both.
        type: string
        default: full-history
      gitleaks-version:
        description: gitleaks version to install.
        type: string
        default: "8.30.0"
      trufflehog-version:
        description: trufflehog version to install.
        type: string
        default: "3.93.7"
      fetch-depth:
        description: >-
          Git fetch depth. Set to 0 for full history (default for
          full-history scans), 1 for working-tree only scans.
        type: number
        default: 0
      allowlist-config:
        description: Path to a gitleaks allowlist config file.
        type: string
        default: ""
      timeout-minutes:
        description: Job timeout in minutes.
        type: number
        default: 15

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    if: inputs.tool == 'gitleaks' || inputs.tool == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: >-
            ${{
              (inputs.scan-scope == 'working-tree' && 1)
              || inputs.fetch-depth
            }}

      - uses: ./actions/run-gitleaks
        with:
          version: ${{ inputs.gitleaks-version }}
          args: >-
            detect --source .
            ${{
              (inputs.scan-scope == 'working-tree'
                && '--no-git')
              || ''
            }}
            ${{
              inputs.allowlist-config != ''
              && format('--config {0}', inputs.allowlist-config)
              || ''
            }}

  trufflehog:
    name: trufflehog
    if: inputs.tool == 'trufflehog' || inputs.tool == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: >-
            ${{
              (inputs.scan-scope == 'working-tree' && 1)
              || inputs.fetch-depth
            }}

      - uses: ./actions/run-trufflehog
        with:
          version: ${{ inputs.trufflehog-version }}
          args: >-
            ${{
              (inputs.scan-scope == 'working-tree'
                && 'filesystem --directory .')
              || 'git file://.'
            }}
