name: Release Zig binaries

on:
  workflow_call:
    inputs:
      zig-version:
        description: >-
          Zig version to install (e.g., "0.15.2"). Takes precedence over
          zig-version-file. Leave empty to use zig-version-file or to
          fall back to mlugg/setup-zig's own auto-detection of
          minimum_zig_version in build.zig.zon.
        type: string
        default: ""
      zig-version-file:
        description: >-
          Path to a .zon file from which .minimum_zig_version is read
          (e.g., "build.zig.zon"). Used only when zig-version is empty.
        type: string
        default: ""
      binary-name:
        description: Name of the binary to build and package (e.g., "seine").
        type: string
        required: true
      targets:
        description: >-
          Space-separated Zig target triples to build.
        type: string
        default: >-
          x86_64-linux-gnu aarch64-linux-gnu x86_64-macos
          aarch64-macos x86_64-windows-gnu
      optimize:
        description: Zig optimization level.
        type: string
        default: ReleaseSafe
      runs-on:
        description: >-
          Runner label (ubuntu-latest or macos-latest recommended;
          Windows is not supported).
        type: string
        default: ubuntu-latest
      timeout-minutes:
        description: Job timeout in minutes.
        type: number
        default: 30

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve Zig version
        id: resolve-zig-version
        shell: bash
        env:
          ZIG_VERSION: ${{ inputs.zig-version }}
          ZIG_VERSION_FILE: ${{ inputs.zig-version-file }}
        run: |
          if [ -n "${ZIG_VERSION}" ]; then
            version="${ZIG_VERSION}"
          elif [ -n "${ZIG_VERSION_FILE}" ]; then
            if [ ! -f "${ZIG_VERSION_FILE}" ]; then
              echo "::error::zig-version-file does not exist: ${ZIG_VERSION_FILE}" >&2
              exit 1
            fi
            zon_pattern='s/^[[:space:]]*\.minimum_zig_version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p'
            version="$(sed -nE "${zon_pattern}" "${ZIG_VERSION_FILE}" | head -n 1)"
            if [ -z "${version}" ]; then
              echo "::error::Could not parse .minimum_zig_version from ${ZIG_VERSION_FILE}" >&2
              exit 1
            fi
          else
            version=""
          fi
          if [[ -n "${version}" && ! "${version}" =~ ^[A-Za-z0-9._+-]+$ ]]; then
            echo "::error::Resolved Zig version contains invalid characters" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: ${{ steps.resolve-zig-version.outputs.version }}

      - name: Build and package
        shell: bash
        env:
          BINARY_NAME: ${{ inputs.binary-name }}
          TARGETS: ${{ inputs.targets }}
          OPTIMIZE: ${{ inputs.optimize }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          dist_dir="${RUNNER_TEMP}/dist"
          mkdir -p "${dist_dir}"

          for target in ${TARGETS}; do
            echo "::group::Building for ${target}"
            zig build -Dtarget="${target}" -Doptimize="${OPTIMIZE}"

            # Map Zig target triple to user-friendly OS and architecture labels.
            case "${target}" in
              x86_64-linux-*)    os="linux";   arch="amd64" ;;
              aarch64-linux-*)   os="linux";   arch="arm64" ;;
              x86_64-macos*)     os="darwin";  arch="amd64" ;;
              aarch64-macos*)    os="darwin";  arch="arm64" ;;
              x86_64-windows-*)  os="windows"; arch="amd64" ;;
              aarch64-windows-*) os="windows"; arch="arm64" ;;
              *)
                echo "Unsupported target: ${target}" >&2
                exit 1
                ;;
            esac

            artifact_name="${BINARY_NAME}-${version}-${os}-${arch}"
            staging_dir="${RUNNER_TEMP}/staging/${artifact_name}"
            mkdir -p "${staging_dir}"

            if [ "${os}" = "windows" ]; then
              cp "zig-out/bin/${BINARY_NAME}.exe" "${staging_dir}/"
            else
              cp "zig-out/bin/${BINARY_NAME}" "${staging_dir}/"
            fi

            if [ "${os}" = "windows" ]; then
              (cd "${RUNNER_TEMP}/staging" && zip -r "${dist_dir}/${artifact_name}.zip" "${artifact_name}")
            else
              tar -cz -C "${RUNNER_TEMP}/staging" -f "${dist_dir}/${artifact_name}.tar.gz" "${artifact_name}"
            fi

            rm -rf "${RUNNER_TEMP}/staging/${artifact_name}"
            echo "::endgroup::"
          done

          cd "${dist_dir}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -- * > checksums.txt
          else
            shasum -a 256 -- * > checksums.txt
          fi
          echo "Checksums:"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ${{ runner.temp }}/dist/*
          generate_release_notes: true
