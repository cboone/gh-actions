name: Lint text

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to install.
        type: string
        default: "24.15.0"
      run-markdownlint:
        description: Run markdownlint-cli2.
        type: boolean
        default: true
      run-prettier:
        description: Run Prettier format check.
        type: boolean
        default: true
      run-cspell:
        description: Run cspell spell checker.
        type: boolean
        default: false
      run-yamllint:
        description: Run yamllint.
        type: boolean
        default: false
      preset:
        description: |
          Optional preset config bundle. When set, the named preset
          supplies markdownlint-cli2 and cspell configs for tools that
          don't already have a config in the consumer repo. A local
          consumer config always takes precedence over the preset.
          Valid values: "" (default; no preset), "lean-math"
          (Pandoc-flavored academic Markdown with LaTeX-math cspell
          ignores).
        type: string
        default: ""
      timeout-minutes:
        description: Job timeout in minutes.
        type: number
        default: 10

permissions:
  contents: read

env:
  UV_VERSION: 0.11.8
  # markdownlint-cli2, prettier, cspell are pinned in this repo's
  # package-lock.json with per-package sha512 integrity hashes; bump
  # them by editing package.json and running `npm install`.
  # yamllint is pinned in requirements/yamllint.txt with hashes; bump
  # both together.

jobs:
  text-lint:
    name: Text lint
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Validate preset input
        env:
          PRESET: ${{ inputs.preset }}
        run: |
          case "${PRESET}" in
            "" | lean-math) ;;
            *)
              echo "::error::Unknown preset '${PRESET}'. Valid values: '' or 'lean-math'." >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      # Fetch preset configs from this repo at the workflow's own SHA
      # (same supply-chain model as the npm and yamllint installs below).
      # Each preset config is written into the workspace only when the
      # corresponding tool is enabled and the consumer does not already
      # ship a local config, so a local config always wins and disabled
      # tools never trigger a fetch. Auto-discovery picks up the
      # dropped-in file naturally; this keeps relative paths in the
      # preset config (e.g. `./cspell-words.txt`, `references/**`)
      # resolving against the workspace.
      - name: Apply markdownlint preset
        if: inputs.preset != '' && inputs.run-markdownlint
        env:
          PRESET: ${{ inputs.preset }}
          REQ_SHA: ${{ github.job_workflow_sha }}
        run: |
          if [ -z "${REQ_SHA}" ]; then
            echo "::error::github.job_workflow_sha is empty; this workflow must be called via workflow_call." >&2
            exit 1
          fi
          base="https://raw.githubusercontent.com/cboone/gh-actions/${REQ_SHA}/presets/${PRESET}"

          has_local_md=0
          for f in .markdownlint-cli2.jsonc .markdownlint-cli2.yaml \
                   .markdownlint-cli2.cjs .markdownlint-cli2.mjs \
                   .markdownlint.jsonc .markdownlint.json \
                   .markdownlint.yaml .markdownlint.yml \
                   .markdownlint.cjs .markdownlint.mjs; do
            if [ -e "${f}" ]; then
              has_local_md=1
              break
            fi
          done
          if [ "${has_local_md}" -eq 0 ]; then
            curl -sSfL "${base}/.markdownlint-cli2.jsonc" \
              -o ".markdownlint-cli2.jsonc"
            echo "Applied ${PRESET} markdownlint preset."
          else
            echo "Local markdownlint config detected; skipping preset."
          fi

      - name: Apply cspell preset
        if: inputs.preset != '' && inputs.run-cspell
        env:
          PRESET: ${{ inputs.preset }}
          REQ_SHA: ${{ github.job_workflow_sha }}
        run: |
          if [ -z "${REQ_SHA}" ]; then
            echo "::error::github.job_workflow_sha is empty; this workflow must be called via workflow_call." >&2
            exit 1
          fi
          base="https://raw.githubusercontent.com/cboone/gh-actions/${REQ_SHA}/presets/${PRESET}"

          has_local_cspell=0
          for f in cspell.json cspell.jsonc \
                   cspell.config.json cspell.config.jsonc \
                   cspell.config.yaml cspell.config.yml \
                   cspell.config.js cspell.config.cjs cspell.config.mjs \
                   cspell.yaml cspell.yml \
                   .cspell.json .cspell.jsonc; do
            if [ -e "${f}" ]; then
              has_local_cspell=1
              break
            fi
          done
          if [ "${has_local_cspell}" -eq 0 ]; then
            curl -sSfL "${base}/cspell.jsonc" -o "cspell.jsonc"
            echo "Applied ${PRESET} cspell preset."
          else
            echo "Local cspell config detected; skipping preset."
          fi

      - name: Install lint tools (sha512-verified via gh-actions lockfile)
        env:
          # Pin package.json + package-lock.json to the same SHA as this
          # workflow so a tampered registry response cannot slip past npm
          # ci's per-package integrity check. job_workflow_sha is always
          # set when a job comes from a reusable workflow; we fail fast
          # rather than falling back to github.sha (the caller repo's
          # commit, which would 404 on raw.githubusercontent.com).
          REQ_SHA: ${{ github.job_workflow_sha }}
        run: |
          if [ -z "${REQ_SHA}" ]; then
            echo "::error::github.job_workflow_sha is empty; this workflow must be called via workflow_call." >&2
            exit 1
          fi
          install_dir="${RUNNER_TEMP}/lint-text-tools"
          mkdir -p "${install_dir}"
          base="https://raw.githubusercontent.com/cboone/gh-actions/${REQ_SHA}"
          curl -sSfL "${base}/package.json"      -o "${install_dir}/package.json"
          curl -sSfL "${base}/package-lock.json" -o "${install_dir}/package-lock.json"
          (cd "${install_dir}" && npm ci --ignore-scripts --no-audit --no-fund)
          printf '%s\n' "${install_dir}/node_modules/.bin" >> "${GITHUB_PATH}"

      - name: Run markdownlint
        if: inputs.run-markdownlint
        run: markdownlint-cli2 "**/*.md"

      - name: Run Prettier check
        if: inputs.run-prettier
        run: prettier --check .

      - name: Run cspell
        if: inputs.run-cspell
        run: cspell .

      - name: Install uv
        if: inputs.run-yamllint
        run: |
          archive="uv-x86_64-unknown-linux-gnu.tar.gz"
          base_url="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}"
          archive_path="${RUNNER_TEMP}/${archive}"
          curl -sSfL "${base_url}/${archive}" -o "${archive_path}"
          curl -sSfL "${base_url}/${archive}.sha256" -o "${archive_path}.sha256"
          expected="$(awk '{print $1}' "${archive_path}.sha256")"
          actual="$(sha256sum "${archive_path}" | awk '{print $1}')"
          if [ "${expected}" != "${actual}" ]; then
            echo "Checksum verification failed for ${archive}" >&2
            echo "Expected: ${expected}" >&2
            echo "Actual:   ${actual}" >&2
            exit 1
          fi
          install_dir="${RUNNER_TEMP}/uv-bin"
          mkdir -p "${install_dir}"
          tar -xz -C "${RUNNER_TEMP}" -f "${archive_path}"
          install -m 0755 "${RUNNER_TEMP}/uv-x86_64-unknown-linux-gnu/uv" "${install_dir}/uv"
          printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"

      - name: Install yamllint with hash-pinned requirements
        if: inputs.run-yamllint
        env:
          # Pin the requirements file to the same SHA as this workflow,
          # so callers cannot pick up a tampered hash list. See the npm
          # install step above for why we do not fall back to github.sha.
          REQ_SHA: ${{ github.job_workflow_sha }}
        run: |
          if [ -z "${REQ_SHA}" ]; then
            echo "::error::github.job_workflow_sha is empty; this workflow must be called via workflow_call." >&2
            exit 1
          fi
          curl -sSfL \
            -o "${RUNNER_TEMP}/yamllint-requirements.txt" \
            "https://raw.githubusercontent.com/cboone/gh-actions/${REQ_SHA}/requirements/yamllint.txt"
          uv venv "${RUNNER_TEMP}/yamllint-venv" --quiet
          uv pip install \
            --python "${RUNNER_TEMP}/yamllint-venv/bin/python" \
            --require-hashes \
            -r "${RUNNER_TEMP}/yamllint-requirements.txt" \
            --quiet
          printf '%s\n' "${RUNNER_TEMP}/yamllint-venv/bin" >> "${GITHUB_PATH}"

      - name: Run yamllint
        if: inputs.run-yamllint
        run: yamllint .
