name: Analyze with CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: >-
          Comma-separated list of CodeQL languages to analyze (e.g. "go",
          "javascript", "python").
        type: string
        default: go
      queries:
        description: >-
          CodeQL query suite to run (e.g. security-extended,
          security-and-quality).
        type: string
        default: security-and-quality
      go-version:
        description: >-
          Go version to install. When set, overrides go-version-file.
        type: string
        default: ""
      go-version-file:
        description: File to read the Go version from.
        type: string
        default: go.mod
      category-prefix:
        description: >-
          Prefix for the CodeQL analysis category. The full languages string
          is appended as "<prefix><languages>" (e.g. "/language:go"). When
          analyzing multiple languages, call this workflow once per language
          so each gets its own category.
        type: string
        default: "/language:"
      runs-on:
        description: Runner label.
        type: string
        default: macos-latest
      timeout-minutes:
        description: Job timeout in minutes.
        type: number
        default: 30

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        if: contains(inputs.languages, 'go')
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: >-
            ${{ inputs.go-version == '' && inputs.go-version-file || '' }}
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ inputs.languages }}
          queries: ${{ inputs.queries }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          category: "${{ inputs.category-prefix }}${{ inputs.languages }}"
