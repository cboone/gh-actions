name: GitHub Lint

on:
  workflow_call:
    inputs:
      actionlint-version:
        description: actionlint version to install.
        type: string
        default: "1.7.11"
      timeout-minutes:
        description: Job timeout in minutes.
        type: number
        default: 10

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        shell: bash
        env:
          VERSION: ${{ inputs.actionlint-version }}
        run: |
          case "$(uname -s)" in
            Linux) os="linux" ;;
            Darwin) os="darwin" ;;
            *)
              echo "Unsupported operating system: $(uname -s)" >&2
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          archive="actionlint_${VERSION}_${os}_${arch}.tar.gz"
          install_dir="${RUNNER_TEMP}/actionlint-bin"
          mkdir -p "${install_dir}"
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${archive}" \
            | tar -xz -C "${install_dir}" actionlint
          printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint
