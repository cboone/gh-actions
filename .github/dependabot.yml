# Dependabot keeps two surfaces up to date:
#
# 1. github-actions: every `uses:` reference in .github/workflows/ and in
#    actions/*/action.yml that points to an external action. Dependabot
#    follows the SHA-pin convention and updates both the SHA and the
#    `# vX.Y.Z` comment.
# 2. npm: package.json + package-lock.json devDependencies.
#
# Dependabot does NOT track:
#   - Tool version strings inside workflow `env:` blocks or `inputs.*-version`
#     defaults (e.g., `MARKDOWNLINT_CLI2_VERSION: 0.22.1`,
#     `gitleaks-version: "8.30.1"`). These are bumped manually or via the
#     `update-everything` skill. A future Renovate config (custom managers
#     with regex rules) could automate them.
#   - Hardcoded SHA-256 checksums for shfmt/scrut/cargo-audit. These must
#     be bumped together with their version string.
#
# Minor/patch updates are grouped into one PR per ecosystem per week.
# Major updates open individual PRs so breaking-change risk stays visible.

version: 2
updates:
  - package-ecosystem: github-actions
    directories:
      - "/"
      - "/actions/create-pull-request"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
